name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install current Codex CLI
        run: npm install --global @openai/codex@0.142.0-alpha.6

      - name: Unit, integration, and lifecycle tests
        run: python -m unittest discover -s tests -v

      - name: Compile package
        run: python -m compileall -q src scripts tests

      - name: Secret and privacy scan
        run: python scripts/privacy_scan.py

      - name: Plugin manifest and Skill validation
        run: python scripts/validate_plugin.py .

      - name: Shell installer smoke test
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/smoke-test.sh

      - name: PowerShell installer smoke test
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/smoke-test.ps1

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Build wheel and source archive
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build
      - name: Install wheel and inspect CLI
        run: |
          python -m pip install dist/*.whl
          agent-project-memory --help
      - name: Scan packaged artifacts and archive listings
        run: python scripts/privacy_scan.py
